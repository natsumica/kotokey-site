<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KotoKey</title>
  <script>
    (function () {
      var languages = navigator.languages || [navigator.language || navigator.userLanguage || ""];
      var isJapanese = languages.some(function (language) {
        return String(language).toLowerCase().indexOf("ja") === 0;
      });

      window.location.replace(isJapanese ? "./ja/" : "./en/");
    }());
  </script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; margin: 0; color: #24231f; background: #f5efe3; line-height: 1.7; }
    main { max-width: 720px; margin: 0 auto; padding: 56px 24px; }
    h1 { font-size: 36px; margin-bottom: 8px; }
    a { color: #24231f; font-weight: 700; }
    nav { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 28px; }
  </style>
</head>
<body>
  <main>
    <h1>KotoKey</h1>
    <p>ブラウザの言語設定に合わせてページを開いています。</p>
    <nav>
      <a href="./ja/">日本語</a>
      <a href="./en/">English</a>
    </nav>
    <noscript>
      <p>自動で移動しない場合は、上のリンクから言語を選択してください。</p>
    </noscript>
  </main>
</body>
</html>
